name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'dev'

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build Windows
        run: wails3 task windows:build
        env:
          CGO_ENABLED: 0
        
      - name: List build output
        run: Get-ChildItem -Path bin -Recurse

      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: pedro-windows-${{ matrix.arch }}
          path: bin/pedro.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build macOS
        run: wails3 task darwin:build ARCH=${{ matrix.arch }}
        env:
          CGO_ENABLED: 1

      - name: Package macOS App
        run: wails3 task darwin:package ARCH=${{ matrix.arch }}

      - name: Create DMG
        run: |
          APP_PATH="bin/pedro.app"
          DMG_NAME="Pedro-macos-${{ matrix.arch }}.dmg"
          
          if [ -d "$APP_PATH" ]; then
            hdiutil create -volname "Pedro" -srcfolder "$APP_PATH" -ov -format UDZO "bin/$DMG_NAME"
          fi

      - name: List build output
        run: ls -la bin/

      - name: Zip macOS App
        run: |
          cd bin
          zip -r pedro-${{ matrix.arch }}.app.zip pedro.app
          
      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        with:
          name: pedro-macos-${{ matrix.arch }}-app
          path: bin/pedro-${{ matrix.arch }}.app.zip
          if-no-files-found: error

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: pedro-macos-${{ matrix.arch }}-dmg
          path: bin/*.dmg
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [amd64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build Linux
        run: wails3 task linux:build
        env:
          CGO_ENABLED: 1

      - name: List build output
        run: ls -la bin/

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: pedro-linux-${{ matrix.arch }}
          path: bin/pedro
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Prepare release files
        run: |
          mkdir -p release
          
          echo "=== Listing all artifacts ==="
          find artifacts -type f -o -type d | head -100
          
          # Windows binary
          if [ -d "artifacts/pedro-windows-amd64" ]; then
            cp artifacts/pedro-windows-amd64/pedro.exe release/Pedro-windows-amd64.exe || echo "No Windows binary found"
          fi
          
          # macOS DMGs
          if [ -d "artifacts/pedro-macos-amd64-dmg" ]; then
            cp artifacts/pedro-macos-amd64-dmg/*.dmg release/Pedro-macos-amd64.dmg || echo "No amd64 DMG found"
          fi
          if [ -d "artifacts/pedro-macos-arm64-dmg" ]; then
            cp artifacts/pedro-macos-arm64-dmg/*.dmg release/Pedro-macos-arm64.dmg || echo "No arm64 DMG found"
          fi
          
          # macOS apps (already zipped)
          if [ -d "artifacts/pedro-macos-amd64-app" ]; then
            cp artifacts/pedro-macos-amd64-app/*.zip release/Pedro-macos-amd64-app.zip || echo "No amd64 app zip found"
          fi
          if [ -d "artifacts/pedro-macos-arm64-app" ]; then
            cp artifacts/pedro-macos-arm64-app/*.zip release/Pedro-macos-arm64-app.zip || echo "No arm64 app zip found"
          fi
          
          # Linux binary
          if [ -d "artifacts/pedro-linux-amd64" ]; then
            cp artifacts/pedro-linux-amd64/pedro release/Pedro-linux-amd64 || echo "No Linux binary found"
            chmod +x release/Pedro-linux-amd64 || true
          fi
          
          echo "=== Release files ==="
          ls -la release/ || echo "Release directory is empty or does not exist"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
