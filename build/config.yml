# This file contains the configuration for this project.
version: '3'

# This information is used to generate the build assets.
info:
  companyName: "Pedro Corp"
  productName: "Pedro"
  productIdentifier: "com.pedro.app"
  description: "Pedro AI Chat"
  copyright: "(c) 2026, Pedro Corp"
  comments: "Built with Wails"
  version: "1.0.0"

# Dev mode configuration
dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

# File Associations
fileAssociations:

# Other data
other:
  - name: My Other Data
