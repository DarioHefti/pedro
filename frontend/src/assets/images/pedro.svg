  <!-- Laptop -->
  <rect x="85" y="170" width="90" height="55" rx="6" fill="#777"/>

  <!-- Coffee mug -->
  <rect x="65" y="185" width="20" height="20" rx="3" fill="#ffffff" stroke="#333" stroke-width="2"/>
  <path d="M85 188 Q95 195 85 202" stroke="#333" stroke-width="2" fill="none"/>

  <!-- Steam -->
  <path d="M72 180 Q75 170 78 180" stroke="#999" stroke-width="2" fill="none"/>
  <path d="M78 180 Q81 170 84 180" stroke="#999" stroke-width="2" fill="none"/>
</svg>