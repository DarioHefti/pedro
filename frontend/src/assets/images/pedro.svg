<svg width="260" height="260" viewBox="50 40 160 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="50" y="40" width="160" height="160" fill="#f4f4f4"/>

  <!-- Head -->
  <circle cx="130" cy="100" r="50" fill="#f1c27d"/>

  <!-- Hair -->
  <path d="M80 90 Q130 20 180 90 L180 70 Q130 10 80 70 Z" fill="#2b2b2b"/>

  <!-- Glasses -->
  <circle cx="110" cy="100" r="15" stroke="#333" stroke-width="3" fill="none"/>
  <circle cx="150" cy="100" r="15" stroke="#333" stroke-width="3" fill="none"/>
  <line x1="125" y1="100" x2="135" y2="100" stroke="#333" stroke-width="3"/>

  <!-- Eyes -->
  <circle cx="110" cy="100" r="4" fill="#333"/>
  <circle cx="150" cy="100" r="4" fill="#333"/>

  <!-- Nose -->
  <line x1="130" y1="105" x2="130" y2="115" stroke="#aa7a4d" stroke-width="2"/>

  <!-- Mouth -->
  <path d="M115 125 Q130 135 145 125" stroke="#333" stroke-width="2" fill="none"/>

  <!-- Body -->
  <rect x="90" y="150" width="80" height="50" rx="10" fill="#4a90e2"/>

  <!-- Shirt detail -->
  <line x1="130" y1="150" x2="130" y2="200" stroke="#2c3e50" stroke-width="2"/>

  <!-- Nerdy pocket -->
